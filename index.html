<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FreshGo — Fresh Asian produce, delivered.</title>
<link rel="stylesheet" href="colors_and_type.css" />
<link rel="icon" href="assets/logo-mark.svg" type="image/svg+xml" />
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: var(--color-bg);
    color: var(--color-fg-1);
    display: flex;
    flex-direction: column;
  }

  /* Subtle warm cream→white gradient anchor, per system guidance */
  .stage {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: var(--space-12) var(--space-6);
    background:
      radial-gradient(ellipse 90% 60% at 50% 0%, #ffffff 0%, var(--color-bg) 60%);
  }

  .card {
    width: 100%;
    max-width: 760px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: var(--space-12);
  }

  /* ---------- Logo / wordmark ---------- */
  .logo {
    position: relative;
    display: inline-flex;
    align-items: baseline;
    font-family: var(--font-display);
    font-weight: var(--fw-black);
    font-size: clamp(56px, 9vw, 96px);
    line-height: 0.95;
    letter-spacing: -0.035em;
    /* leave room above for the star-anise mark */
    padding-top: 0.55em;
  }
  .logo .fresh { color: var(--fg-watermelon); }
  .logo .go    { color: var(--fg-leaf);       }

  /* The star-anise mark, parked above the seam between "Fresh" and "Go" */
  .logo .mark {
    position: absolute;
    top: 0;
    /* The seam between "Fresh" and "Go" lands at ~64% of the wordmark width
       at this letter-spacing. Tweak with a CSS variable if needed. */
    left: 63.5%;
    width: 0.36em;
    height: 0.36em;
    transform: translateX(-50%);
    transform-origin: center bottom;
    animation: spark 1100ms var(--ease-bounce) 400ms 1 both;
  }
  .logo .mark svg { display: block; width: 100%; height: 100%; }

  @keyframes spark {
    0%   { opacity: 0; transform: translateX(-50%) translateY(0.6em) scale(0.4) rotate(-40deg); }
    55%  { opacity: 1; transform: translateX(-50%) translateY(-0.08em) scale(1.12) rotate(8deg); }
    100% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1) rotate(0deg); }
  }

  /* ---------- Tagline ---------- */
  .tagline {
    font-family: var(--font-display);
    font-weight: var(--fw-extrabold);
    font-size: clamp(24px, 3.4vw, 36px);
    line-height: 1.25;
    letter-spacing: -0.02em;
    color: var(--color-fg-1);
    max-width: 22ch;
    margin: 0;
    text-wrap: balance;
  }
  .tagline em {
    font-style: normal;
    color: var(--fg-leaf-700);
    background: linear-gradient(transparent 62%, var(--fg-leaf-50) 62%);
    padding: 0 0.08em;
  }

  /* ---------- Info grid ---------- */
  .info {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: var(--space-10) var(--space-12);
    width: 100%;
    padding-top: var(--space-10);
    border-top: 1px solid var(--color-border);
  }
  @media (max-width: 560px) {
    .info { grid-template-columns: 1fr; gap: var(--space-8); }
  }

  .info-block { display: flex; flex-direction: column; gap: var(--space-3); }

  .eyebrow {
    /* overrides .eyebrow color from system to use ink — quieter */
    color: var(--color-fg-3);
    font-size: 11px;
  }

  .info address {
    font-style: normal;
    font-size: var(--fs-body-lg);
    line-height: 1.55;
    color: var(--color-fg-1);
  }

  .emails {
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
  }
  .emails a {
    font-family: var(--font-body);
    font-size: var(--fs-body-lg);
    color: var(--color-fg-1);
    font-weight: var(--fw-medium);
    text-decoration: none;
    width: fit-content;
    transition: color var(--dur-fast) var(--ease-out);
  }
  .emails a:hover {
    color: var(--color-primary-hover);
    text-decoration: underline;
    text-underline-offset: 4px;
    text-decoration-thickness: 2px;
    text-decoration-color: var(--color-primary);
  }

  /* Map link – tiny, optional */
  .map-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: var(--space-1);
    font-size: var(--fs-body-sm);
    color: var(--color-fg-3);
    font-weight: var(--fw-medium);
  }
  .map-link:hover { color: var(--color-primary); text-decoration: underline; text-underline-offset: 3px; }
  .map-link svg { width: 14px; height: 14px; }

  /* ---------- Top bar ---------- */
  .topbar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    display: flex;
    justify-content: flex-end;
    padding: var(--space-5) var(--space-8);
    z-index: 2;
  }
  @media (max-width: 560px) {
    .topbar { padding: var(--space-4) var(--space-5); }
  }

  .login-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px 10px 20px;
    border-radius: var(--radius-pill);
    background: var(--color-bg-elevated);
    border: 1px solid var(--color-border);
    box-shadow: var(--shadow-xs);
    font-family: var(--font-display);
    font-weight: var(--fw-bold);
    font-size: var(--fs-body-sm);
    color: var(--color-fg-1);
    text-decoration: none;
    transition:
      transform var(--dur-fast) var(--ease-out),
      box-shadow var(--dur-fast) var(--ease-out),
      border-color var(--dur-fast) var(--ease-out),
      color var(--dur-fast) var(--ease-out);
  }
  .login-link:hover {
    color: var(--color-primary-hover);
    border-color: var(--color-primary);
    box-shadow: var(--shadow-sm);
    transform: translateY(-1px);
    text-decoration: none;
  }
  .login-link:active { transform: translateY(0) scale(0.98); }
  .login-link svg {
    width: 14px;
    height: 14px;
    stroke: currentColor;
    transition: transform var(--dur-fast) var(--ease-out);
  }
  .login-link:hover svg { transform: translateX(2px); }

  /* ---------- Footer ---------- */
  footer {
    padding: var(--space-6) var(--space-6);
    display: flex;
    justify-content: center;
    color: var(--color-fg-4);
    font-size: var(--fs-caption);
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
  <nav class="topbar" aria-label="Account">
    <a class="login-link" href="https://my.freshgo.io/#login">
      Log in
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M5 12h14"/>
        <path d="m13 6 6 6-6 6"/>
      </svg>
    </a>
  </nav>

  <main class="stage">
    <div class="card">

      <a class="logo" href="/" aria-label="FreshGo home">
        <span class="fresh">Fresh</span><span class="go">Go</span>
        <span aria-hidden="true" class="mark">
          <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
            <g transform="translate(24 24)" fill="#2FC27A">
              <rect x="-2.6" y="-20" width="5.2" height="40" rx="2.6"></rect>
              <rect x="-2.6" y="-20" width="5.2" height="40" rx="2.6" transform="rotate(45)"></rect>
              <rect x="-2.6" y="-20" width="5.2" height="40" rx="2.6" transform="rotate(90)"></rect>
              <rect x="-2.6" y="-20" width="5.2" height="40" rx="2.6" transform="rotate(135)"></rect>
            </g>
          </svg>
        </span>
      </a>

      <p class="tagline">
        We distribute <em>Asian fruits and veggies</em> countrywide. Drop us a line.
      </p>

      <div class="info">
        <div class="info-block">
          <span class="eyebrow">Visit</span>
          <address>
            13991 SW 252nd St<br/>
            Princeton, FL 33032
          </address>
          <a class="map-link"
             href="https://www.google.com/maps/search/?api=1&amp;query=13991+SW+252nd+St+Princeton+FL+33032"
             target="_blank" rel="noopener noreferrer">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/>
              <circle cx="12" cy="10" r="3"/>
            </svg>
            Get directions
          </a>
        </div>

        <div class="info-block">
          <span class="eyebrow">Contact</span>
          <div class="emails">
            <a href="mailto:hello@freshgo.io">hello@freshgo.io</a>
            <a href="mailto:sales@freshgo.io">sales@freshgo.io</a>
          </div>
        </div>
      </div>

    </div>
  </main>

  <footer>© 2026 FreshGo · Princeton, FL</footer>
</body>
</html>
